<div class="min-h-screen bg-gray-100 p-6">
  <div class="max-w-3xl mx-auto">
    <!-- Profile Header Card -->
    <div class="bg-gradient-to-r from-blue-500 to-blue-600 rounded-2xl shadow-lg p-6 mb-6">
      <div class="flex items-center gap-6">
        <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center shadow-lg">
          <span class="text-4xl">👨‍🎓</span>
        </div>
        <div>
          <h2 class="text-3xl font-bold text-white">{{ student?.name }}</h2>
          <p class="text-blue-100">Student Profile</p>
        </div>
      </div>
    </div>

    <!-- Profile Details Card -->
    <div class="bg-white rounded-2xl shadow-lg p-6">
      <h3 class="text-xl font-bold text-gray-800 mb-6 flex items-center gap-2">
        <span>📋</span> Personal Information
      </h3>
      
      <div *ngIf="student as s" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Student ID -->
        <div class="bg-gray-50 rounded-xl p-4 hover:shadow-md transition-shadow">
          <p class="text-sm text-gray-500 mb-1">Student ID</p>
          <p class="text-lg font-bold text-gray-800">{{ s.id }}</p>
        </div>

        <!-- Name -->
        <div class="bg-gray-50 rounded-xl p-4 hover:shadow-md transition-shadow">
          <p class="text-sm text-gray-500 mb-1">Full Name</p>
          <p class="text-lg font-bold text-gray-800">{{ s.name }}</p>
        </div>

        <!-- Department -->
        <div class="bg-gray-50 rounded-xl p-4 hover:shadow-md transition-shadow">
          <p class="text-sm text-gray-500 mb-1">Department</p>
          <p class="text-lg font-bold text-gray-800">{{ s.dept_name }}</p>
        </div>

        <!-- Total Credits -->
        <div class="bg-gray-50 rounded-xl p-4 hover:shadow-md transition-shadow">
          <p class="text-sm text-gray-500 mb-1">Total Credits</p>
          <p class="text-lg font-bold text-gray-800 flex items-center gap-2">
            <span class="px-3 py-1 bg-yellow-100 text-yellow-700 rounded-full text-sm">{{ s.tot_cred }} Credits</span>
          </p>
        </div>
      </div>

      <!-- Contact Information -->
      <h3 class="text-xl font-bold text-gray-800 mt-8 mb-6 flex items-center gap-2">
        <span>📧</span> Contact Information
      </h3>
      
      <div *ngIf="student as s" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-gray-50 rounded-xl p-4 hover:shadow-md transition-shadow">
          <p class="text-sm text-gray-500 mb-1">Email Address</p>
          <p class="text-lg font-medium text-gray-800">{{ s.gmail }}</p>
        </div>
        
        <div class="bg-gray-50 rounded-xl p-4 hover:shadow-md transition-shadow">
          <p class="text-sm text-gray-500 mb-1">Status</p>
          <p class="text-lg font-bold text-green-600 flex items-center gap-2">
            <span class="w-3 h-3 bg-green-500 rounded-full"></span> Active
          </p>
        </div>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="mt-6 grid grid-cols-1 md:grid-cols-3 gap-4">
      <button class="bg-white rounded-xl p-4 shadow hover:shadow-lg transition-all text-center">
        <span class="text-2xl">📚</span>
        <p class="font-medium text-gray-800 mt-2">View Courses</p>
      </button>
      <button class="bg-white rounded-xl p-4 shadow hover:shadow-lg transition-all text-center">
        <span class="text-2xl">📅</span>
        <p class="font-medium text-gray-800 mt-2">Timetable</p>
      </button>
      <button class="bg-white rounded-xl p-4 shadow hover:shadow-lg transition-all text-center">
        <span class="text-2xl">📊</span>
        <p class="font-medium text-gray-800 mt-2">Grades</p>
      </button>
    </div>
  </div>
</div>
